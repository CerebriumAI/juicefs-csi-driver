apiVersion: v1
kind: ConfigMap
metadata:
  name: juicefs-daemonset-config
  namespace: kube-system
data:
  # Default configuration for all StorageClasses (if no specific config exists)
  default: |
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: node-role.kubernetes.io/control-plane
            operator: DoesNotExist
  
  # Specific configuration for a StorageClass named "juicefs-sc"
  juicefs-sc: |
    nodeAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        nodeSelectorTerms:
        - matchExpressions:
          - key: juicefs/mount-node
            operator: In
            values:
            - "true"
  
  # Another StorageClass with different affinity
  juicefs-sc-performance: |
    nodeAffinity:
      preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        preference:
          matchExpressions:
          - key: node.kubernetes.io/instance-type
            operator: In
            values:
            - m5.xlarge
            - m5.2xlarge